<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Poll Theme Test</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="custom active topCenter" style="position:relative; top:auto; left:auto; transform:none;">
    <div class="border">
      <ul class="options">

        <li class="question">
          <span class="text">What is your favourite game?</span>
        </li>

        <li class="help">
          <span>Type number (1,2...) or text in chat to vote</span>
        </li>

        <li>
          <div class="number">1</div>
          <div class="text">Crab Champions</div>
          <div class="procent">42.0%</div>
          <div class="bar"><div class="bar-inner" style="width:42%"></div></div>
        </li>

        <li>
          <div class="number">2</div>
          <div class="text">Cassette Beasts</div>
          <div class="procent">28.0%</div>
          <div class="bar"><div class="bar-inner" style="width:28%"></div></div>
        </li>

        <li>
          <div class="number">3</div>
          <div class="text">Palworld</div>
          <div class="procent">18.0%</div>
          <div class="bar"><div class="bar-inner" style="width:18%"></div></div>
        </li>

        <li>
          <div class="number">4</div>
          <div class="text">Stardew Valley</div>
          <div class="procent">8.0%</div>
          <div class="bar"><div class="bar-inner" style="width:8%"></div></div>
        </li>

        <li>
          <div class="number">5</div>
          <div class="text">Dave the Diver</div>
          <div class="procent">4.0%</div>
          <div class="bar"><div class="bar-inner" style="width:4%"></div></div>
        </li>

      </ul>

      <div class="metaInfo">
        <div class="total"><strong>100</strong>Unique Votes</div>
        <div class="duration"><strong>5 Minutes</strong>Time Active</div>
      </div>

      <div class="credits">poll.ma.pe</div>
    </div>
  </div>

</body>
</html>
